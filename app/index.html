<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Under Maintenance</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 700px;
      padding: 30px;
    }

    h1 {
      font-size: 3rem;
      margin-bottom: 20px;
    }

    h2 {
      color: #fbbf24;
      margin-bottom: 20px;
    }

    p {
      font-size: 1.2rem;
      line-height: 1.8;
      color: #d1d5db;
    }

    .icon {
      font-size: 80px;
      margin-bottom: 20px;
    }

    .status {
      margin-top: 30px;
      display: inline-block;
      padding: 12px 25px;
      background: #f59e0b;
      color: black;
      font-weight: bold;
      border-radius: 8px;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="icon">🔧</div>

    <h1>Website Under Maintenance</h1>

    <h2>We'll Be Back Soon!</h2>

    <p>
      We are currently performing scheduled maintenance to improve our services.
      We apologize for any inconvenience and appreciate your patience.
    </p>

    <p style="margin-top:20px;">
      Please check back later.
    </p>

    <div class="status">
      Maintenance in Progress
    </div>
  </div>

</body>
</html>
